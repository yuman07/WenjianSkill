<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="sword" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.4"/>

  <!-- Book/scroll base -->
  <g transform="translate(256,280) rotate(-10)">
    <!-- Left page -->
    <path d="M-10,40 Q-10,-60 -80,-70 L-80,50 Q-10,45 -10,40 Z" fill="#d4a574" opacity="0.9"/>
    <!-- Right page -->
    <path d="M10,40 Q10,-60 80,-70 L80,50 Q10,45 10,40 Z" fill="#e8c99b" opacity="0.9"/>
    <!-- Spine -->
    <rect x="-10" y="-70" width="20" height="120" rx="3" fill="#8b6914"/>
    <!-- Text lines on right page -->
    <line x1="22" y1="-45" x2="65" y2="-45" stroke="#a08060" stroke-width="2" opacity="0.5"/>
    <line x1="22" y1="-30" x2="60" y2="-30" stroke="#a08060" stroke-width="2" opacity="0.5"/>
    <line x1="22" y1="-15" x2="55" y2="-15" stroke="#a08060" stroke-width="2" opacity="0.5"/>
    <line x1="22" y1="0" x2="62" y2="0" stroke="#a08060" stroke-width="2" opacity="0.5"/>
    <line x1="22" y1="15" x2="50" y2="15" stroke="#a08060" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Sword -->
  <g transform="translate(256,200) rotate(35)">
    <!-- Blade -->
    <polygon points="0,-140 8,-20 0,-10 -8,-20" fill="url(#sword)"/>
    <!-- Blade edge highlight -->
    <polygon points="0,-140 3,-20 0,-10" fill="white" opacity="0.3"/>
    <!-- Guard -->
    <ellipse cx="0" cy="-10" rx="28" ry="8" fill="url(#glow)"/>
    <!-- Grip -->
    <rect x="-5" y="-10" width="10" height="45" rx="3" fill="#8b4513"/>
    <!-- Grip wrap -->
    <line x1="-5" y1="0" x2="5" y2="5" stroke="#a0522d" stroke-width="2"/>
    <line x1="-5" y1="10" x2="5" y2="15" stroke="#a0522d" stroke-width="2"/>
    <line x1="-5" y1="20" x2="5" y2="25" stroke="#a0522d" stroke-width="2"/>
    <!-- Pommel -->
    <circle cx="0" cy="38" r="8" fill="url(#glow)"/>
  </g>

  <!-- Sparkle effects -->
  <circle cx="310" cy="120" r="3" fill="#f59e0b" opacity="0.8"/>
  <circle cx="180" cy="150" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="340" cy="180" r="2.5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="200" cy="100" r="2" fill="#fcd34d" opacity="0.5"/>

  <!-- Title text: 问剑 -->
  <text x="256" y="440" text-anchor="middle" font-family="serif" font-size="52" font-weight="bold" fill="#f59e0b">问剑</text>
</svg>
