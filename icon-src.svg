<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0c8d8"/>
      <stop offset="45%" style="stop-color:#e8eef6"/>
      <stop offset="55%" style="stop-color:#f0f4fa"/>
      <stop offset="100%" style="stop-color:#a0aab8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="bamboo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="30%" style="stop-color:#a08968"/>
      <stop offset="70%" style="stop-color:#9c8560"/>
      <stop offset="100%" style="stop-color:#7a6548"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.4"/>

  <!-- === Bamboo Slips (竹简) === -->
  <g transform="translate(248,285) rotate(-8)">
    <!-- Individual bamboo strips (竹片) -->
    <rect x="-65" y="-50" width="10" height="90" rx="1.5" fill="url(#bamboo)" opacity="0.85"/>
    <rect x="-52" y="-50" width="10" height="90" rx="1.5" fill="#9c8560" opacity="0.9"/>
    <rect x="-39" y="-50" width="10" height="90" rx="1.5" fill="url(#bamboo)" opacity="0.88"/>
    <rect x="-26" y="-50" width="10" height="90" rx="1.5" fill="#9c8560" opacity="0.85"/>
    <rect x="-13" y="-50" width="10" height="90" rx="1.5" fill="url(#bamboo)" opacity="0.9"/>
    <rect x="0"   y="-50" width="10" height="90" rx="1.5" fill="#9c8560" opacity="0.87"/>
    <rect x="13"  y="-50" width="10" height="90" rx="1.5" fill="url(#bamboo)" opacity="0.85"/>
    <rect x="26"  y="-50" width="10" height="90" rx="1.5" fill="#9c8560" opacity="0.9"/>
    <rect x="39"  y="-50" width="10" height="90" rx="1.5" fill="url(#bamboo)" opacity="0.88"/>
    <rect x="52"  y="-50" width="10" height="90" rx="1.5" fill="#9c8560" opacity="0.85"/>

    <!-- Binding cords (编绳) -->
    <line x1="-68" y1="-30" x2="65" y2="-30" stroke="#6b4c30" stroke-width="2.5" opacity="0.7"/>
    <line x1="-68" y1="20"  x2="65" y2="20"  stroke="#6b4c30" stroke-width="2.5" opacity="0.7"/>

    <!-- Text on strips (墨迹) -->
    <line x1="-60" y1="-18" x2="-60" y2="10" stroke="#3a2a18" stroke-width="1.5" opacity="0.35"/>
    <line x1="-47" y1="-20" x2="-47" y2="12" stroke="#3a2a18" stroke-width="1.5" opacity="0.3"/>
    <line x1="-34" y1="-16" x2="-34" y2="8"  stroke="#3a2a18" stroke-width="1.5" opacity="0.35"/>
    <line x1="-21" y1="-18" x2="-21" y2="14" stroke="#3a2a18" stroke-width="1.5" opacity="0.3"/>
    <line x1="-8"  y1="-20" x2="-8"  y2="10" stroke="#3a2a18" stroke-width="1.5" opacity="0.35"/>
    <line x1="5"   y1="-16" x2="5"   y2="12" stroke="#3a2a18" stroke-width="1.5" opacity="0.3"/>
    <line x1="18"  y1="-18" x2="18"  y2="8"  stroke="#3a2a18" stroke-width="1.5" opacity="0.35"/>
    <line x1="31"  y1="-20" x2="31"  y2="14" stroke="#3a2a18" stroke-width="1.5" opacity="0.3"/>
    <line x1="44"  y1="-16" x2="44"  y2="10" stroke="#3a2a18" stroke-width="1.5" opacity="0.35"/>
    <line x1="57"  y1="-18" x2="57"  y2="12" stroke="#3a2a18" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- === Chinese Sword (中式直剑) - moved down === -->
  <g transform="translate(270,250) rotate(32)">
    <polygon points="-5,-145 5,-145 6,-20 -6,-20" fill="url(#blade)"/>
    <polygon points="-5,-145 0,-160 5,-145" fill="#dde4f0"/>
    <line x1="0" y1="-158" x2="0" y2="-20" stroke="#f8faff" stroke-width="1.2" opacity="0.5"/>
    <line x1="-5.5" y1="-145" x2="-6.5" y2="-20" stroke="white" stroke-width="0.8" opacity="0.25"/>
    <rect x="-22" y="-22" width="44" height="8" rx="2" fill="url(#glow)"/>
    <line x1="-18" y1="-18" x2="18" y2="-18" stroke="#b8860b" stroke-width="1" opacity="0.6"/>
    <rect x="-5" y="-14" width="10" height="42" rx="2" fill="#5c3a1e"/>
    <line x1="-5" y1="-6" x2="5" y2="-2" stroke="#7a5030" stroke-width="2.5"/>
    <line x1="-5" y1="2" x2="5" y2="6" stroke="#7a5030" stroke-width="2.5"/>
    <line x1="-5" y1="10" x2="5" y2="14" stroke="#7a5030" stroke-width="2.5"/>
    <line x1="-5" y1="18" x2="5" y2="22" stroke="#7a5030" stroke-width="2.5"/>
    <circle cx="0" cy="32" r="9" fill="url(#glow)"/>
    <circle cx="0" cy="32" r="5" fill="#b8860b" opacity="0.6"/>
    <path d="M5,38 Q12,50 8,68" stroke="#c0392b" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M3,38 Q8,52 5,70" stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M7,38 Q15,48 12,65" stroke="#c0392b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Sparkle effects -->
  <circle cx="315" cy="130" r="3" fill="#f59e0b" opacity="0.8"/>
  <circle cx="170" cy="170" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="340" cy="190" r="2.5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="190" cy="120" r="2" fill="#fcd34d" opacity="0.5"/>
  <circle cx="235" cy="110" r="3.5" fill="#e8eef6" opacity="0.25"/>
</svg>
