<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0c8d8"/>
      <stop offset="45%" style="stop-color:#e8eef6"/>
      <stop offset="55%" style="stop-color:#f0f4fa"/>
      <stop offset="100%" style="stop-color:#a0aab8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="scroll" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6c8"/>
      <stop offset="100%" style="stop-color:#d4b896"/>
    </linearGradient>
    <linearGradient id="roller" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6c42"/>
      <stop offset="50%" style="stop-color:#a07850"/>
      <stop offset="100%" style="stop-color:#6b5030"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.4"/>

  <!-- === Scroll (卷轴) === -->
  <g transform="translate(256,290) rotate(-8)">
    <!-- Unrolled scroll body -->
    <rect x="-70" y="-55" width="140" height="95" rx="2" fill="url(#scroll)" opacity="0.92"/>

    <!-- Vertical text lines on scroll (古代竖排书写) -->
    <line x1="45" y1="-40" x2="45" y2="26" stroke="#8a7050" stroke-width="1.5" opacity="0.45"/>
    <line x1="30" y1="-40" x2="30" y2="20" stroke="#8a7050" stroke-width="1.5" opacity="0.4"/>
    <line x1="15" y1="-40" x2="15" y2="28" stroke="#8a7050" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-40" x2="0" y2="22" stroke="#8a7050" stroke-width="1.5" opacity="0.35"/>
    <line x1="-15" y1="-40" x2="-15" y2="18" stroke="#8a7050" stroke-width="1.5" opacity="0.35"/>
    <line x1="-30" y1="-40" x2="-30" y2="24" stroke="#8a7050" stroke-width="1.5" opacity="0.3"/>
    <line x1="-45" y1="-40" x2="-45" y2="16" stroke="#8a7050" stroke-width="1.5" opacity="0.3"/>

    <!-- Top roller (木轴) -->
    <rect x="-78" y="-62" width="156" height="12" rx="6" fill="url(#roller)"/>
    <!-- Roller end caps -->
    <circle cx="-78" cy="-56" r="8" fill="#6b5030"/>
    <circle cx="-78" cy="-56" r="4" fill="#8b6c42"/>
    <circle cx="78" cy="-56" r="8" fill="#6b5030"/>
    <circle cx="78" cy="-56" r="4" fill="#8b6c42"/>

    <!-- Bottom roller (partially rolled) -->
    <rect x="-78" y="35" width="156" height="12" rx="6" fill="url(#roller)"/>
    <!-- Roll curl effect -->
    <ellipse cx="0" cy="46" rx="70" ry="8" fill="#c4a878" opacity="0.5"/>
    <!-- Roller end caps -->
    <circle cx="-78" cy="41" r="8" fill="#6b5030"/>
    <circle cx="-78" cy="41" r="4" fill="#8b6c42"/>
    <circle cx="78" cy="41" r="8" fill="#6b5030"/>
    <circle cx="78" cy="41" r="4" fill="#8b6c42"/>
  </g>

  <!-- === Chinese Sword (中式直剑) === -->
  <g transform="translate(268,215) rotate(32)">
    <!-- Blade - straight, parallel edges, narrow (直剑特征) -->
    <polygon points="-5,-155 5,-155 6,-20 -6,-20" fill="url(#blade)"/>
    <!-- Blade tip - tapered point -->
    <polygon points="-5,-155 0,-170 5,-155" fill="#dde4f0"/>
    <!-- Center ridge (剑脊) -->
    <line x1="0" y1="-168" x2="0" y2="-20" stroke="#f8faff" stroke-width="1.2" opacity="0.5"/>
    <!-- Edge highlight -->
    <line x1="-5.5" y1="-155" x2="-6.5" y2="-20" stroke="white" stroke-width="0.8" opacity="0.25"/>

    <!-- Guard (剑格) - flat rectangular, Chinese style -->
    <rect x="-22" y="-22" width="44" height="8" rx="2" fill="url(#glow)"/>
    <!-- Guard decorative line -->
    <line x1="-18" y1="-18" x2="18" y2="-18" stroke="#b8860b" stroke-width="1" opacity="0.6"/>

    <!-- Grip (剑柄) - wrapped with cord -->
    <rect x="-5" y="-14" width="10" height="42" rx="2" fill="#5c3a1e"/>
    <!-- Cord wrapping (缠绳) -->
    <line x1="-5" y1="-6" x2="5" y2="-2" stroke="#7a5030" stroke-width="2.5"/>
    <line x1="-5" y1="2" x2="5" y2="6" stroke="#7a5030" stroke-width="2.5"/>
    <line x1="-5" y1="10" x2="5" y2="14" stroke="#7a5030" stroke-width="2.5"/>
    <line x1="-5" y1="18" x2="5" y2="22" stroke="#7a5030" stroke-width="2.5"/>

    <!-- Pommel (剑首) - round disc style -->
    <circle cx="0" cy="32" r="9" fill="url(#glow)"/>
    <circle cx="0" cy="32" r="5" fill="#b8860b" opacity="0.6"/>

    <!-- Tassel (剑穗) -->
    <path d="M5,38 Q12,50 8,68" stroke="#c0392b" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M3,38 Q8,52 5,70" stroke="#e74c3c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M7,38 Q15,48 12,65" stroke="#c0392b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Sparkle effects -->
  <circle cx="315" cy="120" r="3" fill="#f59e0b" opacity="0.8"/>
  <circle cx="175" cy="160" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="345" cy="180" r="2.5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="195" cy="110" r="2" fill="#fcd34d" opacity="0.5"/>
  <!-- Sword qi glow -->
  <circle cx="230" cy="100" r="4" fill="#e8eef6" opacity="0.3"/>
  <circle cx="245" cy="85" r="3" fill="#e8eef6" opacity="0.2"/>
</svg>
