name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number without v prefix (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
    steps:
      - name: Validate semver input
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid semver '$VERSION'. Expected e.g. 1.2.3 or 1.2.3-beta.1 (no v prefix)."
            exit 1
          fi
      - name: Derive tag and prerelease flag
        id: vars
        run: |
          VERSION="${{ inputs.version }}"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -Eq '-(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.validate.outputs.tag }}" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "WenjianSkill ${{ needs.validate.outputs.tag }}" \
            ${{ needs.validate.outputs.prerelease == 'true' && '--prerelease' || '' }}

  build-macos:
    needs: [validate, create-release]
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin
      - run: npm ci
      - name: Build macOS DMG
        run: npx tauri build --target aarch64-apple-darwin
      - name: Rename artifact with version info
        run: |
          VERSION="${{ inputs.version }}"
          MIN_OS=$(python3 -c "import json, re; v=json.load(open('src-tauri/tauri.conf.json'))['bundle']['macOS']['minimumSystemVersion']; print(re.sub(r'\.0+$', '', v))")
          APP_NAME=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['productName'])")
          DMG_FILE=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          mv "$DMG_FILE" "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/${APP_NAME}_macOS${MIN_OS}_arm64_${VERSION}.dmg"
      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.validate.outputs.tag }}" \
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg \
            --clobber

  build-windows:
    needs: [validate, create-release]
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: npm ci
      - name: Build portable exe
        run: npx tauri build --no-bundle
      - name: Rename artifact with version info
        shell: python
        run: |
          import json, re, shutil
          conf = json.load(open("src-tauri/tauri.conf.json", encoding="utf-8"))
          app_name = conf["productName"]
          version = "${{ inputs.version }}"
          # Windows minimum is a project-wide policy (Windows 10+); tauri.conf.json
          # has no matching field, so the constant lives here.
          win_os = "10"
          cargo = open("src-tauri/Cargo.toml", encoding="utf-8").read()
          m = re.search(r'^name\s*=\s*"([^"]+)"', cargo, re.MULTILINE)
          exe_basename = m.group(1)
          src = f"src-tauri/target/release/{exe_basename}.exe"
          dst = f"src-tauri/target/release/{app_name}_Win{win_os}_x64_{version}.exe"
          shutil.move(src, dst)
      - name: Upload exe to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path src-tauri/target/release -Filter "*_Win10_x64_*.exe" | Select-Object -First 1
          gh release upload "${{ needs.validate.outputs.tag }}" $exe.FullName --clobber

  publish-release:
    needs: [validate, build-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.validate.outputs.tag }}" \
            --draft=false \
            --repo "$GITHUB_REPOSITORY"
