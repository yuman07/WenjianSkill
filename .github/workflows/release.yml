name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin
      - name: Rename artifact with version info
        run: |
          VERSION="${{ inputs.version }}"
          MIN_OS=$(python3 -c "import json, re; v=json.load(open('src-tauri/tauri.conf.json'))['bundle']['macOS']['minimumSystemVersion']; print(re.sub(r'\.0+$', '', v))")
          APP_NAME=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['productName'])")
          DMG_FILE=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          mv "$DMG_FILE" "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/${APP_NAME}_macOS${MIN_OS}_arm64_${VERSION}.dmg"
      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - name: Build portable exe
        run: npx tauri build --no-bundle
      - name: Rename artifact with version info
        shell: python
        run: |
          import json, re, shutil
          conf = json.load(open("src-tauri/tauri.conf.json"))
          app_name = conf["productName"]
          version = "${{ inputs.version }}"
          # Windows minimum is a project-wide policy (Windows 10+); tauri.conf.json
          # has no matching field, so the constant lives here.
          win_os = "10"
          cargo = open("src-tauri/Cargo.toml").read()
          m = re.search(r'^name\s*=\s*"([^"]+)"', cargo, re.MULTILINE)
          exe_basename = m.group(1)
          src = f"src-tauri/target/release/{exe_basename}.exe"
          dst = f"src-tauri/target/release/{app_name}_Win{win_os}_x64_{version}.exe"
          shutil.move(src, dst)
      - uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: src-tauri/target/release/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: WenjianSkill v${{ inputs.version }}
          files: artifacts/*
